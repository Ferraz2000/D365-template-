# brain.config.toml — configuração por projeto do hipocampo
# Gerado por brain-init. Você não edita à mão normalmente; peça ao agente para
# evoluir (ex.: "adiciona uma regra doc-sync para src/webresources/").
#
# IMPORTANTE (TOML): chaves "soltas" (sem [tabela]) precisam vir ANTES do primeiro
# cabeçalho [tabela] — senão o parser as aninha na última seção. Mantenha todos os
# escalares/arrays de topo aqui em cima e só depois as tabelas ([dirs], [search]…).

vault_root = "docs/brain"
language = "pt-BR"
project_mode = "greenfield"   # projeto novo (template)
team = true                   # fluxo de PR + sugestão de branch protegido para o vault
base_branch = "main"

areas = ["meta", "architecture", "plugins", "webresources", "alm"]

statuses = [
  "triage", "active", "deferred",
  "implemented", "closed", "rejected", "superseded", "promoted",
]
active_states = ["ready", "in-progress"]
inactive_statuses = ["rejected", "closed", "discarded", "superseded", "implemented"]

# Nível de captura: equilibrado (decisões + contratos + lições + fontes)
capture_triggers = [
  "decidido", "a decisão é", "de agora em diante", "sempre", "regra de bolso",
  "lição aprendida", "trade-off", "anti-padrão", "canônico",
  "decided", "decision is", "from now on", "always", "lesson learned",
  "trade-off", "anti-pattern", "canonical",
]
capture_agent_triggers = ["anti-padrão", "canônico", "padrão consolidado", "anti-pattern", "canonical"]
capture_internal_hosts = ["localhost", "127.0.0.1"]
capture_verbs = ["/capture", "registra isso", "save to the brain"]
doc_links_exclude_dirs = ["coverage", "node_modules", "bin", "obj", ".venv", "dist", "build", "target", "vendor"]
required_docs = []

# Preflight (pre-push/CI) roda só integridade — link morto / proveniência quebrada.
# feature_doc_sync NÃO entra aqui: ele roda no pre-commit via `hipocampo.gate` como
# advisory (ver [enforcement] abaixo), pra não travar push/CI por doc desatualizada.
validators = ["doc_links", "vault_sync"]

doc_sync_escape_globs = ["**/doc-impact-reports/**/*.md"]

[dirs]
knowledge = "knowledge"
inbox = "knowledge/_inbox"
insights = "insights"
raw_sources = "raw/sources"
generated = "_generated"
cache = ".brain-cache"

[area_aliases]

[inbox]
decay_days = 30
sweep_type = "capture-sweep"

[search]
dirs = ["knowledge", "insights", "specs", "raw/sources"]
hidden_statuses = ["closed", "implemented", "rejected", "superseded", "deferred"]

[router]
file = "AGENTS.md"
max_lines = 120

[views]
notes_root = "insights"
id_label = "Note"

[catalog]
skills_dirs = []
catalog_doc = ""
required_files = []
required_files_max_lines = 80

# --- Enforcement (por ponto: block | warn | off) --------------------------
# Os git hooks e o CI chamam `python -m hipocampo.gate <ponto>`; o modo abaixo
# decide se uma violação bloqueia. pre_commit roda só feature_doc_sync (doc-sync);
# pre_push/ci rodam o preflight completo (validators = integridade).
#   pre_commit = "warn"  → doc-sync avisa no commit, nunca trava o dev humano
#   pre_push   = "block" → integridade (doc_links/vault_sync) trava o push
#   ci         = "block" → integridade trava o merge
[enforcement]
pre_commit = "warn"
pre_push = "block"
ci = "block"

# --- Doc-sync gate (team) -------------------------------------------------
# Mexeu no código-fonte de uma área sensível? O agente atualiza o doc correspondente
# no MESMO diff (ou um Doc Impact Report). Mantém código e padrão em sincronia.
# É advisory no commit (ver [enforcement] pre_commit = "warn"): avisa, não bloqueia.

[[doc_sync]]
name = "plugins"
paths = ["src/plugins/**"]
docs = ["docs/architecture/plugins.md"]

[[doc_sync]]
name = "webresources"
paths = ["src/webresources/**"]
docs = ["docs/architecture/webresources.md"]
